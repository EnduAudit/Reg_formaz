name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name GestioneFormazioni gestione_formazioni.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: GestioneFormazioni-exe
          path: dist/GestioneFormazioni.exe
